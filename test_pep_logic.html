<!DOCTYPE html>
<html>
<head>
    <title>PEP Logic Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-case { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .urgent { background: #ffebee; border-color: #f44336; }
        .warning { background: #fff3e0; border-color: #ff9800; }
        .routine { background: #e8f5e8; border-color: #4caf50; }
    </style>
</head>
<body>
    <h1>PEP Logic Test</h1>
    <p><em>Updated to match classifyPEPEligibility() from app.js</em></p>
    <div id="test-results"></div>
    
    <script>
        /**
         * WHO-aligned PEP Eligibility Classification (matches app.js classifyPEPEligibility)
         * Key fixes:
         * - Issue 4: Only uses PARTNER's STI status, NOT user's own STI status (WHO aligned)
         * - Issue 3: Only cis women excluded from biological risk for receptive acts (not trans women)
         * - Includes condom use and partner status as risk factors
         */
        function classifyPEPEligibility(actType, partnerStatus, partnerGender, partnerHasSTI, condomUse, hoursSinceEncounter) {
            // Only consider exposures within 72-hour PEP window
            if (hoursSinceEncounter > 72) {
                return { shouldRecommendPEP: false, isWithinWindow: false, reason: null };
            }

            // Only recommend PEP when there's actual biological HIV risk
            const hasHivRisk = partnerStatus !== 'negative' && partnerStatus !== 'positive_undetectable';
            if (!hasHivRisk) {
                return { shouldRecommendPEP: false, isWithinWindow: true, reason: null };
            }

            // Consider biological reality for PEP recommendations
            const isPartnerCisFemale = partnerGender === 'cis_female';

            // No biological HIV risk scenarios (only for cis female partners):
            // 1. Receptive anal with cis female partner (pegging) - no biological exposure
            // 2. Receptive vaginal with cis female partner - user is insertive male, no receptive exposure
            // Note: Trans women are NOT excluded - surgical status varies
            const hasBiologicalRisk = !((actType === 'receptive_anal' && isPartnerCisFemale) ||
                                       (actType === 'receptive_vaginal' && isPartnerCisFemale));

            if (!hasBiologicalRisk) {
                return { shouldRecommendPEP: false, isWithinWindow: true, reason: null };
            }

            // High-risk exposures: receptive anal or shared needles
            const isHighRiskExposure = (actType === 'receptive_anal' || actType === 'shared_needles');

            // Known positive partner always warrants PEP consideration
            const isKnownPositivePartner = partnerStatus === 'positive_detectable';

            // Moderate-risk exposures with additional risk factors
            // Note: Only uses PARTNER's STI status and condom use, NOT user's own STI (WHO aligned)
            const isModerateRiskWithFactors = (actType === 'receptive_vaginal' || actType === 'insertive_anal') &&
                                                (partnerStatus === 'positive_detectable' ||
                                                 partnerHasSTI ||
                                                 condomUse !== 'yes');

            if (isHighRiskExposure) {
                return { shouldRecommendPEP: true, isWithinWindow: true, reason: 'high-risk exposure' };
            } else if (isKnownPositivePartner) {
                return { shouldRecommendPEP: true, isWithinWindow: true, reason: 'exposure to HIV-positive partner' };
            } else if (isModerateRiskWithFactors) {
                return { shouldRecommendPEP: true, isWithinWindow: true, reason: 'moderate-risk exposure with additional risk factors' };
            }

            return { shouldRecommendPEP: false, isWithinWindow: true, reason: null };
        }
        
        // Test cases - updated to test the corrected logic
        const testCases = [
            { act: 'receptive_anal', partner: 'unknown', gender: 'cis_male', partnerSTI: false, condom: 'no', hours: 24, desc: 'Receptive anal, unknown status' },
            { act: 'shared_needles', partner: 'unknown', gender: 'cis_male', partnerSTI: false, condom: 'no', hours: 24, desc: 'Shared needles' },
            { act: 'receptive_vaginal', partner: 'unknown', gender: 'cis_male', partnerSTI: false, condom: 'no', hours: 24, desc: 'Receptive vaginal, unknown status (moderate risk)' },
            { act: 'receptive_vaginal', partner: 'positive_detectable', gender: 'cis_male', partnerSTI: false, condom: 'yes', hours: 24, desc: 'Receptive vaginal, known positive partner (PEP recommended regardless of condom)' },
            { act: 'receptive_vaginal', partner: 'unknown', gender: 'cis_male', partnerSTI: true, condom: 'no', hours: 24, desc: 'Receptive vaginal, partner has STI (PEP recommended)' },
            { act: 'receptive_vaginal', partner: 'unknown', gender: 'cis_male', partnerSTI: false, condom: 'yes', hours: 24, desc: 'Receptive vaginal, condom used, no partner STI (no PEP - protected)' },
            { act: 'receptive_vaginal', partner: 'unknown', gender: 'cis_female', partnerSTI: false, condom: 'no', hours: 24, desc: 'Receptive vaginal with cis female partner (no biological risk - no PEP)' },
            { act: 'insertive_vaginal', partner: 'unknown', gender: 'cis_female', partnerSTI: false, condom: 'no', hours: 24, desc: 'Insertive vaginal, unknown status' },
            { act: 'giving_oral', partner: 'unknown', gender: 'cis_male', partnerSTI: false, condom: 'no', hours: 24, desc: 'Giving oral sex (low risk)' },
            { act: 'receptive_anal', partner: 'unknown', gender: 'cis_male', partnerSTI: false, condom: 'no', hours: 96, desc: 'Receptive anal after 96 hours (outside PEP window)' }
        ];
        
        const results = document.getElementById('test-results');
        
        testCases.forEach(test => {
            const result = classifyPEPEligibility(test.act, test.partner, test.gender, test.partnerSTI, test.condom, test.hours);
            const urgency = result.shouldRecommendPEP ? 'urgent' : (result.isWithinWindow ? 'routine' : 'warning');
            const div = document.createElement('div');
            div.className = `test-case ${urgency}`;
            div.innerHTML = `
                <strong>${test.desc}</strong><br>
                Act: ${test.act}, Partner: ${test.partner} (${test.gender}), Partner STI: ${test.partnerSTI}, Condom: ${test.condom}, Hours: ${test.hours}<br>
                <strong>PEP: ${result.shouldRecommendPEP ? 'RECOMMENDED' : 'Not recommended'}</strong>${result.reason ? ' - ' + result.reason : ''}
                ${!result.isWithinWindow ? ' <em>(Outside 72h window)</em>' : ''}
            `;
            results.appendChild(div);
        });
    </script>
</body>
</html>
